name: Build Debug APK

# main 브랜치에 푸시하거나, Actions 탭에서 수동 실행할 때 빌드
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 가져오기
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: 디버그 APK 빌드
        run: ./gradlew assembleDebug

      - name: APK 업로드 (Actions 결과에서 다운로드 가능)
        uses: actions/upload-artifact@v4
        with:
          name: online-jeonwoojo-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
